<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calendar Body -->
  <rect x="15" y="25" width="60" height="55" rx="8" fill="#888888" />
  <!-- Rings -->
  <rect x="25" y="15" width="6" height="20" rx="3" fill="#666666" />
  <rect x="55" y="15" width="6" height="20" rx="3" fill="#666666" />
  
  <!-- Grid -->
  <rect x="25" y="40" width="10" height="10" fill="#ffffff" />
  <rect x="40" y="40" width="10" height="10" fill="#ffffff" />
  <rect x="55" y="40" width="10" height="10" fill="#ffffff" />
  <rect x="25" y="55" width="10" height="10" fill="#ffffff" />
  <rect x="40" y="55" width="10" height="10" fill="#ffffff" />
  <rect x="55" y="55" width="10" height="10" fill="#ffffff" />

  <!-- Blue Check Circle -->
  <circle cx="75" cy="30" r="20" fill="#ffffff" />
  <circle cx="75" cy="30" r="16" fill="#0088cc" />
  <path d="M68 30 L73 35 L82 24" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Red Cross Circle -->
  <circle cx="75" cy="75" r="20" fill="#ffffff" />
  <circle cx="75" cy="75" r="16" fill="#e60000" />
  <path d="M68 68 L82 82 M82 68 L68 82" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
